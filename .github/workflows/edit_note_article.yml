name: Edit Note Article

on:
  workflow_dispatch:
    inputs:
      note_key:
        description: '修正するnote記事のキー (例: n6855a6f6aaf0)'
        required: true
        type: string

jobs:
  edit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: period042/x-affiliate-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q fonts-noto-cjk

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Python dependencies
        run: pip install playwright requests

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Edit note article
        env:
          NOTE_KEY:      ${{ inputs.note_key }}
          NOTE_COOKIES:  ${{ secrets.NOTE_COOKIES }}
          NOTE_EMAIL:    ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          GITHUB_ACTIONS: "true"
          DATA_DIR:      ${{ github.workspace }}/data
        run: python scripts/edit_note_article.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edit-screenshots-${{ github.run_id }}
          path: /tmp/edit_*.png
          if-no-files-found: ignore
