name: Refresh Threads Token

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Threadsの認証コード (https://threads.net/oauth/authorize から取得)'
        required: true
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Exchange auth code for long-lived token
        id: exchange
        env:
          AUTH_CODE:  ${{ inputs.auth_code }}
          APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
        run: |
          APP_ID="1510156694190451"
          REDIRECT_URI="https://localhost/"

          echo "[1/3] 認証コードでトークン取得..."
          SHORT_RESP=$(curl -s -X POST https://graph.threads.net/oauth/access_token \
            --data-urlencode "client_id=$APP_ID" \
            --data-urlencode "client_secret=$APP_SECRET" \
            --data-urlencode "grant_type=authorization_code" \
            --data-urlencode "redirect_uri=$REDIRECT_URI" \
            --data-urlencode "code=$AUTH_CODE")

          SHORT_TOKEN=$(echo "$SHORT_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          INITIAL_EXPIRES=$(echo "$SHORT_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('expires_in','none'))")
          if [ -z "$SHORT_TOKEN" ]; then
            echo "トークン取得失敗: $SHORT_RESP"
            exit 1
          fi
          echo "トークン取得OK (expires_in=${INITIAL_EXPIRES}秒)"

          # expires_in=none でも session-dependent なため必ず th_long_lived_token を試みる
          echo "[2/3] 長期トークンへ変換 (GET) — Liveモードで session 非依存トークンを取得..."
          LONG_RESP=$(curl -s "https://graph.threads.net/access_token?grant_type=th_long_lived_token&client_secret=$APP_SECRET&access_token=$SHORT_TOKEN")
          LONG_TOKEN=$(echo "$LONG_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")

          if [ -z "$LONG_TOKEN" ]; then
            echo "GET変換失敗: $LONG_RESP"
            echo "[3/3] 長期トークンへ変換 (POST fallback)..."
            LONG_RESP2=$(curl -s -X POST "https://graph.threads.net/access_token" \
              --data "grant_type=th_long_lived_token&client_secret=$APP_SECRET&access_token=$SHORT_TOKEN")
            LONG_TOKEN=$(echo "$LONG_RESP2" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
            if [ -z "$LONG_TOKEN" ]; then
              echo "POST変換も失敗: $LONG_RESP2"
              echo "⚠️ 短期トークン（約${INITIAL_EXPIRES}秒）で継続します"
              LONG_TOKEN="$SHORT_TOKEN"
              echo "TOKEN_TYPE=short-lived (${INITIAL_EXPIRES}sec) — th_long_lived_token not supported" >> $GITHUB_ENV
            else
              EXPIRES=$(echo "$LONG_RESP2" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('expires_in','unknown'))")
              echo "長期トークン取得OK via POST (expires_in=${EXPIRES}秒)"
              echo "TOKEN_TYPE=long-lived via POST (${EXPIRES}sec)" >> $GITHUB_ENV
            fi
          else
            EXPIRES=$(echo "$LONG_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('expires_in','unknown'))")
            echo "長期トークン取得OK via GET (expires_in=${EXPIRES}秒)"
            echo "TOKEN_TYPE=long-lived via GET (${EXPIRES}sec)" >> $GITHUB_ENV
          fi
          echo "TOKEN=$LONG_TOKEN" >> $GITHUB_ENV

      - name: Update THREADS_ACCESS_TOKEN secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS }}
          TOKEN: ${{ env.TOKEN }}
        run: |
          echo "$TOKEN" | gh secret set THREADS_ACCESS_TOKEN --repo period042/x-affiliate
          echo "THREADS_ACCESS_TOKEN 更新完了"

      - name: Close token-expired issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=$(gh issue list --repo period042/x-affiliate --label threads-token-expired --state open --json number --jq '.[0].number // empty')
          if [ -n "$ISSUE" ]; then
            gh issue close "$ISSUE" --repo period042/x-affiliate --comment "✅ トークンを更新しました。自動クローズ。"
            echo "Issue #$ISSUE をクローズしました"
          fi

      - name: Summary
        env:
          TOKEN_TYPE: ${{ env.TOKEN_TYPE }}
        run: |
          echo "## Threadsトークン更新完了" >> $GITHUB_STEP_SUMMARY
          echo "- トークン種別: ${TOKEN_TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "- スコープ: threads_basic, threads_manage_replies, threads_manage_insights" >> $GITHUB_STEP_SUMMARY
