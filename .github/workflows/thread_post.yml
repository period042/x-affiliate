name: Thread Post

on:
  schedule:
    # 1日1件スレッド投稿（毎日9:05 JST = 00:05 UTC）
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: period042/x-affiliate-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tweepy

      - name: Post thread
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GITHUB_ACTIONS:        "true"
          DATA_DIR:              ${{ github.workspace }}/data
        run: python scripts/post_thread.py

      - name: Commit queue changes
        if: always()
        working-directory: data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add thread_queue/ thread_posted/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: auto-post thread [skip ci]"
          git pull --rebase origin main
          git push

      - name: Result summary
        if: failure()
        run: echo "## ❌ スレッド投稿失敗" >> $GITHUB_STEP_SUMMARY
