name: Threads Promo Post

on:
  schedule:
    # 1日5回 JST: 7:00 / 10:00 / 13:00 / 17:00 / 21:00
    - cron: '0 22 * * *'   #  7:00 JST (22:00 UTC 前日)
    - cron: '0 1 * * *'    # 10:00 JST
    - cron: '0 4 * * *'    # 13:00 JST
    - cron: '0 8 * * *'    # 17:00 JST
    - cron: '0 12 * * *'   # 21:00 JST
  workflow_dispatch:
concurrency:
  group: threads-promo-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: period042/x-affiliate-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Post to Threads
        env:
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GITHUB_ACTIONS:       "true"
          DATA_DIR:             ${{ github.workspace }}/data
        run: python scripts/post_threads_promo.py

      - name: Commit
        if: always()
        working-directory: data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add threads_promo_posted/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: auto-threads-promo [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main 2>&1 || git rebase --abort
            git push origin main && break
            echo "push attempt $i failed, retrying in ${i}0s..."
            sleep $((i * 10))
          done

      - name: Result summary
        if: failure()
        run: echo "## ❌ Threads宣伝投稿失敗" >> $GITHUB_STEP_SUMMARY
